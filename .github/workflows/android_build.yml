name: Build and Release Android App

on:
  workflow_dispatch:
    inputs:
      app_version_name:
        description: 'Version Name'
        required: true
        default: '2.0.X'
        type: string
      app_version_code:
        description: 'Version Code (0 = auto-increment)'
        required: false
        default: '10000'
        type: string
      note:
        description: 'Update Note'
        required: false
        default: ''
        type: string
      prerelease:
        description: '发布预览版'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore and Setup Properties
        run: |
          echo "MY_KEYSTORE_FILE=upload_keystore.jks" > keystore.properties
          echo "MY_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "MY_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "MY_KEYSTORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> keystore.properties

          mkdir -p Scrcpy/app
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > Scrcpy/app/upload_keystore.jks

      - name: Update Android Version
        id: version
        run: |
          INPUT_CODE="${{ inputs.app_version_code }}"
          if [ "$INPUT_CODE" = "0" ] || [ -z "$INPUT_CODE" ]; then
            CURRENT_CODE=$(grep -oP 'versionCode\\s+\\K\\d+' Scrcpy/app/build.gradle | head -1)
            NEW_CODE=$((CURRENT_CODE + 1))
          else
            NEW_CODE="$INPUT_CODE"
          fi

          sed -i "s/versionCode [0-9]\\+/versionCode ${NEW_CODE}/" Scrcpy/app/build.gradle
          sed -i 's/versionName ".*"/versionName "${{ inputs.app_version_name }}"/' Scrcpy/app/build.gradle

          echo "new_version_code=${NEW_CODE}" >> $GITHUB_OUTPUT
          echo "New versionCode=${NEW_CODE}"
          echo "New versionName=${{ inputs.app_version_name }}"

      - name: Grant execute permission for gradlew
        run: chmod +x Scrcpy/gradlew

      - name: Build Server
        run: |
          cd Scrcpy
          ./gradlew :server:copyRelease --no-daemon

      - name: Build App
        run: |
          cd Scrcpy
          ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p release
          APK_PATH=$(find Scrcpy/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_PATH" release/Scrcpy.apk
          ls -l release

      - name: Generate Tag
        id: tag
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          echo "release_date=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Scrcpy Release ${{ steps.tag.outputs.release_tag }}
          body: |
            Version Name: ${{ inputs.app_version_name }}
            Version Code: ${{ steps.version.outputs.new_version_code }}
            Build Date: ${{ steps.tag.outputs.release_date }}
            Note: ${{ inputs.note }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: release/Scrcpy.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
