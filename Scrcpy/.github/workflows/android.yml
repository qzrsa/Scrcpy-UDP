name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        clean-exclusion: |
         !.gradle
          !.gradle/**
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Clean raw directory
      run: |
        rm -rf app/src/main/res/raw/*
        ls -la app/src/main/res/raw/ || true
    
    - name: Build Server Release
      run: |
        chmod +x gradlew
        ./gradlew :server:assembleRelease --no-daemon
    
    - name: Copy Server to raw
      run: |
        mkdir -p app/src/main/res/raw
        cp server/build/outputs/apk/release/server-release-unsigned.apk app/src/main/res/raw/scrcpy_server
        ls -la app/src/main/res/raw/
    
    - name: Build Debug APK
      run: |
        ./gradlew :app:assembleDebug --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

  build-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd server
        npm install
    
    - name: Upload server
      uses: actions/upload-artifact@v4
      with:
        name: signaling-server
        path: |
          server/*.js
          server/package.json
        retention-days: 30
